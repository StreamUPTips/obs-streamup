# Plugins tab — master enable/disable for each section of StreamUP
Plugins.Section.UI="Interface plugins"
Plugins.Section.System="System plugins"
Plugins.RestartRequired="Restart required"
Plugins.RestartRequired.Banner="Some changes only apply after restarting OBS. You'll see a 'Restart required' badge next to anything affected."
Plugins.IntroBlurb="StreamUP is a few different things in one plugin. Pick what you want, leave the rest off. Anything you turn off doesn't run, doesn't load UI, doesn't bind hotkeys, doesn't watch events. Zero resources."

Plugins.Toolbar.Title="StreamUP Toolbar"
Plugins.Toolbar.Description="A toolbar that pins to any side of OBS. Drop in buttons for streaming, recording, replay buffer, virtual cam, studio mode, scenes, or any custom action. Configure from Settings > Toolbar > Configure Toolbar. Toggles instantly."
Plugins.MultiDock.Title="Multi-Dock System"
Plugins.MultiDock.Description="Container docks that group several OBS or StreamUP docks into one tabbed panel. Useful when your layout is full. Manage from Tools > StreamUP > Multi-Dock. Toggles instantly."
Plugins.SceneOrganiser.Title="Scene Organiser"
Plugins.SceneOrganiser.Description="Replaces the OBS scene list with one that has folders, custom sort orders, and studio-mode-aware switching. Adds a dock for the main canvas and one for vertical or secondary canvases. Needs an OBS restart to disable, OBS won't let plugins remove a registered dock at runtime."
Plugins.StreamupDock.Title="StreamUP Dock"
Plugins.StreamupDock.Description="A dock with one-click buttons for the things you do all the time. Lock sources, refresh browsers, refresh audio monitoring, activate or deactivate video capture devices, group selected sources, toggle visibility. Pick which buttons show from Settings > Dock Configuration. Needs an OBS restart to disable."
Plugins.Hotkeys.Title="StreamUP Hotkeys"
Plugins.Hotkeys.Description="17 hotkeys for source management. Lock all sources or just the current scene's, refresh browsers and audio, open a source's properties or filters or interact, copy and paste show or hide transitions between sources, and a few more. Bind them from OBS Settings > Hotkeys, search 'StreamUP'. Toggles instantly."
Plugins.AdjustmentLayer.Title="Adjustment Layer Source"
Plugins.AdjustmentLayer.Description="A source type that applies its filter chain to everything beneath it on the same scene. Like Photoshop's adjustment layers, for OBS. Add it from the Add Source menu. Needs an OBS restart to disable, and existing adjustment layers in your scenes won't load while it's off."

